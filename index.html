<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quality Roots — Deal Drops</title>

  <!-- GSAP Core + Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/SplitText.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/CustomEase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/MotionPathPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/DrawSVGPlugin.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=qr2b9x">
</head>
<body>
  <div id="scene">

    <!-- ─── LAYER 0 · Background ─────────────────────────────────── -->
    <div id="bg-layer">
      <div id="bg-image"></div>
      <div id="bg-vignette"></div>
      <!-- Animated diagonal stripe overlay -->
      <div id="stripe-overlay">
        <div class="stripe"></div>
        <div class="stripe"></div>
        <div class="stripe"></div>
        <div class="stripe"></div>
        <div class="stripe"></div>
      </div>
    </div>

    <!-- ─── LAYER 1 · Flash / Impact Overlay ──────────────────────── -->
    <div id="flash-overlay"></div>
    <div id="impact-overlay"></div>

    <!-- ─── LAYER 2 · Burst Radial (behind product) ───────────────── -->
    <div id="burst-container">
      <svg id="burst-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet">
        <!-- Lines generated by JS -->
      </svg>
    </div>

    <!-- ─── LAYER 3 · Main Content ────────────────────────────────── -->
    <div id="main-content">

      <!-- LEFT PANEL: Product visual -->
      <div id="left-panel">
        <!-- Category pill -->
        <div id="category-pill">
          <span id="category-text">GUMMIES</span>
        </div>

        <!-- Hex frame behind product image -->
        <div id="hex-frame">
          <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
            <polygon id="hex-poly" points="250,20 470,135 470,365 250,480 30,365 30,135" fill="none" stroke="#7ed856" stroke-width="3"/>
            <polygon id="hex-poly-inner" points="250,50 445,152 445,348 250,450 55,348 55,152" fill="none" stroke="#7ed856" stroke-width="1" opacity="0.4"/>
          </svg>
        </div>

        <!-- Product image -->
        <div id="product-image-wrapper">
          <img id="product-image" src="" alt="Product">
          <div id="product-glow"></div>
        </div>

        <!-- Strain badge -->
        <div id="strain-badge-wrapper">
          <svg class="strain-dot" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4"/></svg>
          <span id="strain-text">HYBRID</span>
        </div>
      </div>

      <!-- RIGHT PANEL: Product info & pricing -->
      <div id="right-panel">

        <!-- Quality Roots Logo (top) -->
        <div id="qr-logo">
          <!-- Inline SVG logo for reliability -->
          <svg id="qr-logo-svg" viewBox="0 0 320 60" xmlns="http://www.w3.org/2000/svg">
            <!-- Hexagon icon -->
            <polygon points="20,5 36,14 36,32 20,41 4,32 4,14" fill="none" stroke="#7ed856" stroke-width="2.5"/>
            <!-- Tree/roots inside hex -->
            <line x1="20" y1="41" x2="20" y2="30" stroke="#7ed856" stroke-width="2"/>
            <line x1="20" y1="35" x2="14" y2="29" stroke="#7ed856" stroke-width="1.5"/>
            <line x1="20" y1="35" x2="26" y2="29" stroke="#7ed856" stroke-width="1.5"/>
            <line x1="20" y1="30" x2="17" y2="24" stroke="#7ed856" stroke-width="1.5"/>
            <line x1="20" y1="30" x2="23" y2="24" stroke="#7ed856" stroke-width="1.5"/>
            <line x1="20" y1="26" x2="20" y2="14" stroke="#7ed856" stroke-width="2"/>
            <!-- Text: QUALITY ROOTS -->
            <text x="48" y="29" font-family="Barlow Condensed, sans-serif" font-weight="900" font-size="22" fill="#ffffff" letter-spacing="3">QUALITY</text>
            <text x="48" y="50" font-family="Barlow Condensed, sans-serif" font-weight="900" font-size="22" fill="#7ed856" letter-spacing="3">ROOTS</text>
          </svg>
        </div>

        <!-- Brand name -->
        <div id="product-brand-wrapper">
          <span id="product-brand">BRAND NAME</span>
        </div>

        <!-- Product Name (SplitText target) -->
        <div id="product-name-wrapper">
          <h1 id="product-name">Product Name Here</h1>
        </div>

        <!-- Separator line (DrawSVG) -->
        <svg id="separator-svg" viewBox="0 0 600 4" preserveAspectRatio="none">
          <line id="separator-line" x1="0" y1="2" x2="600" y2="2" stroke="#7ed856" stroke-width="3"/>
        </svg>

        <!-- Pricing section -->
        <div id="price-section">

          <!-- WAS price -->
          <div id="was-block">
            <span class="price-label">WAS</span>
            <div id="original-price-wrapper">
              <span id="original-price">$0.00</span>
              <!-- Strikethrough drawn via DrawSVG -->
              <svg id="strikethrough-svg" viewBox="0 0 250 36" preserveAspectRatio="none">
                <line id="strikethrough-line" x1="0" y1="18" x2="250" y2="18" stroke="#ff4444" stroke-width="4" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <!-- Badge + Sale Price row -->
          <div id="deal-row">
            <!-- Starburst badge -->
            <div id="badge-wrapper">
              <img id="sale-badge-img" src="https://skoop-dev-code-agent.s3.us-east-1.amazonaws.com/n8n-continue%2Faigen-1773304888306%2Fassets%2Fsale_badge-1773305735071.png" alt="50% OFF">
              <span id="discount-percent">50% OFF</span>
            </div>

            <!-- NOW price -->
            <div id="now-block">
              <span class="price-label">NOW</span>
              <span id="sale-price">$0.00</span>
            </div>
          </div>

        </div><!-- /price-section -->
      </div><!-- /right-panel -->
    </div><!-- /main-content -->

    <!-- ─── LAYER 4 · Foreground Plants ──────────────────────────── -->
    <div id="foreground-layer">
      <img id="foreground-img"
        src="https://skoop-dev-code-agent.s3.us-east-1.amazonaws.com/n8n-continue%2Faigen-1773304888306%2Fassets%2Fforeground_plants-1773305805608.png"
        alt="">
    </div>

    <!-- ─── LAYER 5 · Ticker Bar ─────────────────────────────────── -->
    <div id="ticker-bar">
      <div id="ticker-track">
        <div id="ticker-inner">
          <!-- Content injected by JS for infinite scroll -->
        </div>
      </div>
    </div>

    <!-- ─── LAYER 6 · Corner accents ───────────────────────────────── -->
    <svg id="corner-accents" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <!-- Top-left corner bracket -->
      <path id="corner-tl" d="M 0 80 L 0 0 L 80 0" fill="none" stroke="#7ed856" stroke-width="4"/>
      <!-- Top-right corner bracket -->
      <path id="corner-tr" d="M 1840 0 L 1920 0 L 1920 80" fill="none" stroke="#7ed856" stroke-width="4"/>
      <!-- Bottom-left corner bracket (above ticker) -->
      <path id="corner-bl" d="M 0 940 L 0 1020 L 80 1020" fill="none" stroke="#7ed856" stroke-width="4"/>
      <!-- Bottom-right corner bracket -->
      <path id="corner-br" d="M 1840 1020 L 1920 1020 L 1920 940" fill="none" stroke="#7ed856" stroke-width="4"/>
    </svg>

    <!-- ─── LAYER 7 · Particle System ─────────────────────────────── -->
    <canvas id="particle-canvas"></canvas>

  </div><!-- /scene -->

  <script src="animation.js?v=qr2b9x"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
